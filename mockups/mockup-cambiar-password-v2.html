<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Centro de Costos NOVAHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container-sm" style="max-width: 500px;">
        <div class="mb-4">
            <h4 class="text-primary"><i class="fas fa-key me-2"></i>Cambiar Contraseña</h4>
            <small class="text-muted">Actualiza tu contraseña de acceso al sistema</small>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Contraseña Actual</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="currentPass" placeholder="Ingresa tu contraseña actual">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nueva Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="newPass" placeholder="Ingresa tu nueva contraseña">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted d-block mt-2">
                            <strong>Requisitos:</strong>
                            <ul class="mb-0 ps-3">
                                <li>Mínimo 8 caracteres</li>
                                <li>Incluir mayúscula y minúscula</li>
                                <li>Incluir número y símbolo especial</li>
                            </ul>
                        </small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirmPass" placeholder="Confirma tu nueva contraseña">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="alert alert-info" role="alert">
                        <i class="fas fa-info-circle me-2"></i>
                        <strong>Nota:</strong> Después de cambiar tu contraseña, tendrás que iniciar sesión nuevamente.
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1">
                            <i class="fas fa-check me-1"></i> Guardar Cambios
                        </button>
                        <button type="button" class="btn btn-outline-secondary flex-grow-1">
                            <i class="fas fa-times me-1"></i> Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
