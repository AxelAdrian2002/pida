<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Adicional - Centro de Costos NOVAHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body>
    <div class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="text-white mb-1">Solicitud Adicional</h4>
                <small class="text-light">Asignación especial por rol o autorización <span class="badge bg-purple" style="background: linear-gradient(135deg, #6f42c1 0%, #5a32a3 100%);">$150/item</span></small>
            </div>
            <a href="crear-solicitud-v2.html" class="btn btn-light">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg p-4">
            <form>
                <div class="row g-3">
                    <!-- Tipo de Asignación -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Tipo de Asignación</label>
                        <select class="form-select">
                            <option>Selecciona...</option>
                            <option>Asignación por Rol</option>
                            <option>Asignación Especial</option>
                            <option>Autorización Excepcional</option>
                            <option>Capacitación</option>
                        </select>
                    </div>
                    <!-- Nivel de Autorización -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Nivel de Autorización</label>
                        <select class="form-select">
                            <option>Selecciona...</option>
                            <option>Básico</option>
                            <option>Intermedio</option>
                            <option>Avanzado</option>
                            <option>Administrativo</option>
                        </select>
                    </div>
                    <!-- Cargar Excel -->
                    <div class="col-12">
                        <label class="form-label fw-600">
                            <i class="fas fa-file-excel me-1"></i>Cargar Empleados (Excel)
                        </label>
                        <div class="input-group mb-2">
                            <input type="file" class="form-control" accept=".xlsx,.xls">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-download me-1"></i> Plantilla
                            </button>
                        </div>
                        <small class="form-text text-muted">Formato: ID empleado, Nombre, Fecha Inicio, Fecha Fin</small>
                    </div>
                    <!-- Empleados Cargados -->
                    <div class="col-12">
                        <label class="form-label fw-600">Empleados Cargados</label>
                        <div class="border rounded p-3">
                            <div class="alert alert-info mb-0">
                                <i class="fas fa-info-circle me-1"></i> No hay empleados cargados aún. Sube un archivo Excel.
                            </div>
                        </div>
                    </div>
                    <!-- Vigencia -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Fecha Inicio Vigencia</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-600">Fecha Fin Vigencia (Opcional)</label>
                        <input type="date" class="form-control">
                    </div>
                    <!-- Observaciones -->
                    <div class="col-12">
                        <label class="form-label fw-600">Observaciones</label>
                        <textarea class="form-control" rows="3" placeholder="Detalles y justificación..."></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check me-1"></i> Crear Solicitud
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                        <i class="fas fa-redo me-1"></i> Limpiar
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
