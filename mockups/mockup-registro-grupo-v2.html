<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Grupo - Centro de Costos NOVAHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container-sm" style="max-width: 700px;">
        <div class="mb-4">
            <h4 class="text-success"><i class="fas fa-plus-circle me-2"></i>Registro de Nuevo Grupo</h4>
            <small class="text-muted">Crea un nuevo grupo de equipos o dirección de entrega</small>
        </div>

        <div class="card shadow-sm">
            <form class="p-4">
                <!-- Sección Básica -->
                <div class="mb-4">
                    <h6 class="text-success mb-3">
                        <i class="fas fa-info-circle me-2"></i>Información Básica
                    </h6>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Descripción del Grupo</label>
                            <input type="text" class="form-control" placeholder="Centro Logístico Centro">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Código Interno</label>
                            <input type="text" class="form-control" placeholder="GRP-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <select class="form-select">
                                <option>Activo</option>
                                <option>Inactivo</option>
                                <option>En Construcción</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Sección Dirección -->
                <div class="mb-4">
                    <h6 class="text-primary mb-3">
                        <i class="fas fa-map-marker-alt me-2"></i>Domicilio
                    </h6>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Calle</label>
                            <input type="text" class="form-control" placeholder="Av. Principal">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Número</label>
                            <input type="text" class="form-control" placeholder="500">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Código Postal</label>
                            <input type="text" class="form-control" placeholder="06500">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Departamento/Apt</label>
                            <input type="text" class="form-control" placeholder="Piso 3">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Colonia</label>
                            <input type="text" class="form-control" placeholder="Centro">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Delegación/Municipio</label>
                            <input type="text" class="form-control" placeholder="Cuauhtémoc">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Estado</label>
                            <input type="text" class="form-control" placeholder="CDMX">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">País</label>
                            <input type="text" class="form-control" placeholder="México">
                        </div>
                    </div>
                </div>

                <!-- Sección Contactos -->
                <div class="mb-4">
                    <h6 class="text-info mb-3">
                        <i class="fas fa-user-tie me-2"></i>Contacto Principal
                    </h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre Contacto</label>
                            <input type="text" class="form-control" placeholder="Juan Pérez">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Puesto</label>
                            <input type="text" class="form-control" placeholder="Coordinador">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" placeholder="(555) 1234-5678">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="juan@empresa.com">
                        </div>
                    </div>
                </div>

                <!-- Sección Contacto Alterno -->
                <div class="mb-4">
                    <h6 class="text-info mb-3">
                        <i class="fas fa-user me-2"></i>Contacto Alterno
                    </h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre Contacto</label>
                            <input type="text" class="form-control" placeholder="María López">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Puesto</label>
                            <input type="text" class="form-control" placeholder="Supervisor">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" placeholder="(555) 1234-5679">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="maria@empresa.com">
                        </div>
                    </div>
                </div>

                <!-- Sección Horario -->
                <div class="mb-4">
                    <h6 class="text-warning mb-3">
                        <i class="fas fa-clock me-2"></i>Horario de Operación
                    </h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Hora Apertura</label>
                            <input type="time" class="form-control" value="08:00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hora Cierre</label>
                            <input type="time" class="form-control" value="18:00">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" rows="2" placeholder="Notas adicionales..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1">
                        <i class="fas fa-save me-1"></i> Guardar Grupo
                    </button>
                    <button type="reset" class="btn btn-outline-secondary flex-grow-1">
                        <i class="fas fa-redo me-1"></i> Limpiar
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
