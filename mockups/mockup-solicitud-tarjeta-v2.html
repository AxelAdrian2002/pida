<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Tarjeta/Credencial - Centro de Costos NOVAHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body>
    <div class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="text-white mb-1">Solicitud de Tarjeta/Credencial</h4>
                <small class="text-light">Asignación o reposición de credencial <span class="badge bg-info">$80/item</span></small>
            </div>
            <a href="crear-solicitud-v2.html" class="btn btn-light">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg p-4">
            <form>
                <div class="row g-3">
                    <!-- Tipo de Solicitud -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Tipo de Tarjeta</label>
                        <select class="form-select">
                            <option>Selecciona...</option>
                            <option>Tarjeta Débito</option>
                            <option>Tarjeta Crédito Corporativa</option>
                            <option>Tarjeta de Acceso</option>
                        </select>
                    </div>
                    <!-- Motivo -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Motivo de Solicitud</label>
                        <select class="form-select">
                            <option>Selecciona...</option>
                            <option>Nueva Asignación - Ingreso</option>
                            <option>Reposición - Extravio</option>
                            <option>Reposición - Deterioro</option>
                            <option>Actualización Datos</option>
                        </select>
                    </div>
                    <!-- Empleado -->
                    <div class="col-12">
                        <label class="form-label fw-600">Selecciona Empleados</label>
                        <div class="border rounded p-3" style="max-height: 200px; overflow-y: auto;">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="emp1" value="10001">
                                <label class="form-check-label" for="emp1">
                                    <strong>Andrea Lopez</strong> (EMP-10001) - Coordinadora
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="emp2" value="10002">
                                <label class="form-check-label" for="emp2">
                                    <strong>Luis Martinez</strong> (EMP-10002) - Operario
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="emp3" value="10003">
                                <label class="form-check-label" for="emp3">
                                    <strong>Carla Rodriguez</strong> (EMP-10003) - Administrador
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" id="emp4" value="10004">
                                <label class="form-check-label" for="emp4">
                                    <strong>José Garcia</strong> (EMP-10004) - Supervisor
                                </label>
                            </div>
                        </div>
                        <small class="text-muted">Empleados seleccionados: <strong>0</strong></small>
                    </div>
                    <!-- Observaciones -->
                    <div class="col-12">
                        <label class="form-label fw-600">Observaciones</label>
                        <textarea class="form-control" rows="4" placeholder="Detalles adicionales..."></textarea>
                    </div>
                    <!-- Cálculo -->
                    <div class="col-12">
                        <div class="alert alert-light">
                            <strong>Cálculo:</strong> Precio unitario $80 × 0 empleados = <strong>$0</strong>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check me-1"></i> Crear Solicitud
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                        <i class="fas fa-redo me-1"></i> Limpiar
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
