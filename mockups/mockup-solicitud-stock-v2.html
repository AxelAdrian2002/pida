<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Stock - Centro de Costos NOVAHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border: none; border-radius: 12px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #dee2e6; }
        .btn { border-radius: 8px; }
    </style>
</head>
<body>
    <div class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="text-white mb-1">Solicitud de Stock</h4>
                <small class="text-light">Reposición de saldo de tarjetas <span class="badge bg-warning text-dark">$120/item</span></small>
            </div>
            <a href="crear-solicitud-v2.html" class="btn btn-light">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card shadow-lg p-4">
            <form>
                <div class="row g-3">
                    <!-- Almacén/Centro -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Centro/Almacén</label>
                        <select class="form-select">
                            <option>Centro Principal</option>
                            <option>Centro Norte</option>
                            <option>Centro Sur</option>
                        </select>
                    </div>
                    <!-- Número de items -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Cantidad de Items</label>
                        <input type="number" class="form-control" value="100" min="1">
                        <small class="text-muted">Precio unitario: $120 | Total: $12,000</small>
                    </div>
                    <!-- Prioridad -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Prioridad</label>
                        <select class="form-select">
                            <option>Normal</option>
                            <option>Alta</option>
                            <option>Urgente</option>
                        </select>
                    </div>
                    <!-- Fecha requerida -->
                    <div class="col-md-6">
                        <label class="form-label fw-600">Fecha Requerida</label>
                        <input type="date" class="form-control">
                    </div>
                    <!-- Observaciones -->
                    <div class="col-12">
                        <label class="form-label fw-600">Observaciones</label>
                        <textarea class="form-control" rows="4" placeholder="Detalles adicionales..."></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check me-1"></i> Crear Solicitud
                    </button>
                    <button type="reset" class="btn btn-outline-secondary">
                        <i class="fas fa-redo me-1"></i> Limpiar
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
