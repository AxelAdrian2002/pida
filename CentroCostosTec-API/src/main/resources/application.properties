# =========================================================
# NOVAHUB Gestion Interna - API
# Certificacion Full Stack Web Developer
# =========================================================

# --- Servidor ---
server.port=${SERVER_PORT:8087}
server.servlet.context-path=/api

# --- Usuario de desarrollo ---
app.dev-user.enabled=false

# --- Base de Datos PostgreSQL Local ---
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/pida_local}
spring.datasource.username=${APP_DB_USER:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Inicializacion automatica de esquema local ---
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# Pool de conexiones (Hikari)
spring.datasource.hikari.maximum-pool-size=16
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT CURRENT_TIMESTAMP

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# --- JWT ---
app.jwt.secret=NovaHubGestionInternaSecretKeyForJWT2026DebeSerLarga64Chars!
app.jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

# --- Logging ---
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/novahub-operaciones.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
