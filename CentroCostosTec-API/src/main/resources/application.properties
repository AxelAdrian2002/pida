# =========================================================
# NOVAHUB Gestion Interna - API
# Certificacion Full Stack Web Developer
# =========================================================

# --- Servidor ---
server.port=${PORT:${SERVER_PORT:8087}}
server.servlet.context-path=/api

# --- Usuario de desarrollo ---
app.dev-user.enabled=false

# --- Testing Endpoints ---
app.testing.enabled=true

# --- Base de Datos PostgreSQL local / Docker ---
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/pida_local}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${APP_DB_USER:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}

# --- Inicializacion automatica de esquema ---
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# Pool de conexiones (Hikari)
spring.datasource.hikari.maximum-pool-size=16
spring.datasource.hikari.minimum-idle=4
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT CURRENT_TIMESTAMP

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# --- JWT ---
app.jwt.secret=${APP_JWT_SECRET:local-dev-jwt-secret-change-me}
app.jwt.expiration-ms=86400000

# --- Verificacion de cuentas ---
app.account-verification.base-url=${APP_ACCOUNT_VERIFY_URL:http://localhost:4200/verificar-cuenta}
app.account-verification.token-hours=${APP_ACCOUNT_VERIFY_HOURS:24}

# --- Correo SMTP (Gmail) ---
spring.mail.host=${APP_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${APP_MAIL_PORT:587}
spring.mail.username=${APP_MAIL_USER:}
spring.mail.password=${APP_MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=${APP_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${APP_MAIL_STARTTLS:true}

# --- Email de origen ---
app.mail.from=${APP_MAIL_FROM:}
app.mail.test-recipient=${APP_MAIL_TEST_RECIPIENT:}

# --- CORS ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# --- Logging ---
logging.level.root=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/novahub-operaciones.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
